syntax = "proto3";

package flexodbc;

// Placeholder for Protobuf messages
message PlaceholderRequest {
  string message = 1;
}

message PlaceholderResponse {
  string response = 1;
}

// Messages for SQLDriverConnect
message ConnectRequest {
  string in_connection_string = 1;
  int32 driver_completion = 2;
}

message ConnectResponse {
  string out_connection_string = 1;
  int32 out_connection_string_length = 2;
  string sql_state = 3;
  int32 native_error = 4;
  string message_text = 5;
}

// Service definition
service OdbcDriver {
  rpc Connect(ConnectRequest) returns (ConnectResponse);
}
